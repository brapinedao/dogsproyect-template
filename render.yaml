services:
  - type: web
    name: dogs-project-vue
    runtime: static
    buildCommand: npm install && npm run build-only
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        value: https://dogs-proyect-poli.somee.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
